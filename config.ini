[custom]

; ==========================================================
; 第一阶段：高优先级规则区 (拦截与基础直连)
; 说明：此区域规则最先匹配，用于过滤广告及确保内网、系统基础服务直连
; ==========================================================

; --- 1. 基础拦截与内网直连 ---
; 确保局域网流量不走代理
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/LocalAreaNetwork.list
; 谷歌服务流量（通常建议走代理或特定加速）
; 谷歌商店下载
ruleset=📥 谷歌服务,https://raw.githubusercontent.com/jackyzou226/OpenClash/refs/heads/main/GooglePlayStore.list
; 谷歌其他服务
ruleset=📥 谷歌服务,https://raw.githubusercontent.com/jackyzou226/OpenClash/refs/heads/main/ITC-Google.list

; 修正与绕过：处理一些被误拦截的常用域名
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
; 谷歌中国服务（地图等国内可访问服务）直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list

; --- 2. 中国云服务商及广告拦截 ---
; 国内云服务器 IP 段直连，优化访问速度
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
; 常用广告域名拦截
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
; 应用程序内置广告及插件拦截
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; --- 3. BT/P2P 下载流量直连 ---
; 避免由于代理下载导致流量消耗过快或节点被封
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Download.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Xunlei.list

; ==========================================================
; 第二阶段：分流与代理区 (核心业务逻辑)
; 说明：将常用的国际服务进行分类，便于在策略组中灵活切换节点
; ==========================================================

; --- 1. 系统级推送服务 ---
; 安卓系统关键推送通道，建议走低延迟节点
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list

; --- 2. UGC 自媒体 (YouTube/X/Instagram/FB) ---
; 涵盖视频娱乐与主流社交媒体
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/YouTube.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/YouTubeMusic.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Twitter.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/jackyzou226/OpenClash/refs/heads/main/ITC-X.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Instagram.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Facebook.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/TikTok.list
ruleset=💬 自媒体,https://raw.githubusercontent.com/jackyzou226/OpenClash/refs/heads/main/ITC-TikTok.list

; --- 3. 实时通信 (Telegram/Whatsapp) ---
ruleset=📲 聊天通信,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=📲 聊天通信,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Whatsapp.list

; --- 4. 国际流媒体与新闻媒体 (Netflix/BBC/Disney+) ---
ruleset=🌍 泛媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

; --- 5. AI 平台专项 (ChatGPT/Claude/Gemini) ---
; AI 业务对 IP 纯净度要求较高，单独分流
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

rule set= 🤖 AI 平台，https://raw.githubusercontent.com/jackyzou226/OpenClash/refs/heads/main/ITC-AI.list

; --- 6. 巨头厂商基础服务 (Microsoft/Apple) ---
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; ==========================================================
; 第三阶段：兜底与解析区 (低优先级规则)
; 说明：处理未被上述规则捕获的流量
; ==========================================================

; --- 1. 国内流量判定 (GEOIP) ---
; 基于域名 Geosite 和 IP 归属地直连
ruleset=DIRECT,[]GEOSITE,CN
ruleset=DIRECT,[]GEOIP,CN,no-resolve

; --- 2. 最终兜底 ---
; 所有未匹配流量根据“漏网之鱼”策略组执行
ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 策略组部分 (Policy Groups)
; 说明：定义节点选择逻辑、自动测速及各业务对应的出入口
; ==========================================================

; --- 1. 自动选择逻辑 ---
; 参数说明：测试地址, 间隔(秒), 延迟超时(ms), 容差(ms)
; 该组通过正则排除美、新、日及其他手动节点，对剩余节点进行自动择优
custom_proxy_group=♻️ 自动选择`url-test`^((?!(US|美国|SG|新加坡|JP|其他)).)*$`[]🇺🇸 美国优选`[]🇸🇬 新加坡优选`[]⚡ 极速优选`https://cp.cloudflare.com/generate_204`300,5000,50

; --- 2. 核心人工切换组 ---
; 允许手动在自动、直连及各区域优选组之间切换
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`[]🇺🇸 美国优选`[]🇸🇬 新加坡优选`[]⚡ 极速优选`^((?!(US|美国|SG|新加坡|JP|其他)).)*$

; --- 3. 业务专项策略组 ---
; AI 平台：默认优选新加坡节点
custom_proxy_group=🤖 AI平台`select`[]⚡ 极速优选`[]🇸🇬 新加坡优选`[]♻️ 自动选择`[]🚀 节点选择
; 自媒体：默认使用极速优选（通常为日本节点）
custom_proxy_group=💬 自媒体`select`[]⚡ 极速优选`[]🇸🇬 新加坡优选`[]♻️ 自动选择`[]🚀 节点选择
; 谷歌服务：优化 Play 商店更新速度
custom_proxy_group=📥 谷歌服务`select`[]🇸🇬 新加坡优选`[]♻️ 自动选择`[]🚀 节点选择

; --- 4. 辅助与厂商策略组 ---
custom_proxy_group=🌍 泛媒体`select`[]♻️ 自动选择`[]🚀 节点选择`[]🎯 全球直连
custom_proxy_group=📲 聊天通信`select`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🍎 苹果服务`select`[]♻️ 自动选择`[]DIRECT`[]🚀 节点选择
custom_proxy_group=📢 谷歌FCM`select`[]DIRECT`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]♻️ 自动选择`[]🚀 节点选择`[]DIRECT

; --- 5. 区域优选组 (通过正则表达式抓取特定国家节点) ---
; 抓取包含 US/美国 关键字的节点进行延迟测试
custom_proxy_group=🇺🇸 美国优选`url-test`(US|美国)`https://cp.cloudflare.com/generate_204`300,5000,50
; 抓取包含 SG/新加坡 关键字的节点进行延迟测试
custom_proxy_group=🇸🇬 新加坡优选`url-test`(SG|新加坡)`https://cp.cloudflare.com/generate_204`300,5000,20
; 抓取包含 JP/其他 关键字的节点进行延迟测试（常用作极速出口）
custom_proxy_group=⚡ 极速优选`url-test`(JP|其他)`https://cp.cloudflare.com/generate_204`300,5000,20

; --- 全局配置选项 ---
; 开启规则生成器
enable_rule_generator=true
; 覆盖原始规则，确保自定义分流生效
overwrite_original_rules=true

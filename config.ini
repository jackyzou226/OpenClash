[custom]
; --- 第一阶段：直连与拦截区 (优先级最高) ---

; 1. 基础拦截与内网直连 (防止内网流量走代理，拦截广告)
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list

; 2. 国内主流域名直连 (利用 OpenClash 本地 GEOSITE 数据库，不触发解析，极速)
ruleset=DIRECT,[]GEOSITE,CN

; 3. BT/下载直连 (保护代理节点，防止因 P2P 下载被封号)
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Download.list


; --- 第二阶段：分流与代理区 (已知国外服务，基于域名匹配) ---

; 4. AI平台专项 (匹配你订阅中那个叫“亚太”的节点)
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=🤖 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

; 5. 其它常用国外服务
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=📲 电报信息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list


; --- 第三阶段：兜底与解析区 (最后的身份判定) ---

; 6. 国内 IP 归属地判定 (利用本地 GEOIP 数据库。放在此处防止国外已知域名触发解析)
ruleset=DIRECT,[]GEOIP,CN

; 7. 最终兜底 (所有不匹配以上规则的流量，默认走自动选择)
ruleset=♻️ 自动选择,[]FINAL


; --- 策略组部分 (车站定义) ---

; 1. 自动选择：对所有节点进行延迟测试，选出最快的
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`180,5000,50

; 2. 🚀 节点选择：这是你的手动控制台，列出所有节点，并加入“自动选择”和“直连”选项
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*

; 3. 🤖 AI平台：直接匹配你的“亚太”节点，备选“自动选择”和“手动选择”
custom_proxy_group=🤖 AI平台`select`.*亚太.*`[]♻️ 自动选择`[]🚀 节点选择

; 4. 辅助策略组 (对应上面的 ruleset 命名)
custom_proxy_group=🌍 国外媒体`select`[]♻️ 自动选择`[]🚀 节点选择`[]🎯 全球直连
custom_proxy_group=📲 电报信息`select`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🍎 苹果服务`select`[]♻️ 自动选择`[]DIRECT`[]🚀 节点选择
custom_proxy_group=📢 谷歌FCM`select`[]♻️ 自动选择`[]🚀 节点选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
